<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universo Infinito</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Raleway:wght@300;400&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
        }

        /* Loading Overlay */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 1.5s ease-out;
        }

        .loader-text {
            color: #ffc8d8;
            font-family: 'Raleway', sans-serif;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            font-size: 0.8rem;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.3;
            }

            50% {
                opacity: 1;
            }
        }

        .ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
            z-index: 10;
            padding: 2.5rem 1rem 5rem 1rem;
        }

        .top-text {
            margin-top: 4vh;
            text-align: center;
            animation: fadeUp 2.5s 1.5s ease forwards;
            opacity: 0;
            max-width: 90%;
        }

        .title {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 400;
            font-size: clamp(1.8rem, 6vw, 4rem);
            color: #ffc8d8;
            line-height: 1.1;
            text-shadow:
                0 0 20px rgba(255, 100, 150, 0.8),
                0 0 40px rgba(200, 50, 120, 0.4),
                0 2px 4px rgba(0, 0, 0, 0.9);
        }

        .msg {
            margin-top: 1.2rem;
            font-family: 'Raleway', sans-serif;
            font-weight: 300;
            font-size: clamp(0.8rem, 3.5vw, 1.05rem);
            color: rgba(255, 220, 240, 0.9);
            line-height: 1.75;
            letter-spacing: 0.08em;
            text-shadow: 0 2px 15px rgba(0, 0, 0, 0.95);
        }

        .bottom-greeting {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeUp 2s 0.8s ease forwards;
            opacity: 0;
            width: 100%;
        }

        .greeting {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: clamp(1.1rem, 4.5vw, 2.1rem);
            color: #ffffff;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            text-shadow:
                0 0 18px rgba(255, 140, 200, 0.7),
                0 0 40px rgba(180, 50, 130, 0.4),
                0 2px 6px rgba(0, 0, 0, 0.95);
            margin-bottom: 2rem;
            text-align: center;
        }

        /* Portrait Adjustments */
        @media (max-aspect-ratio: 1/1) {
            .top-text {
                margin-top: 6vh;
            }

            .msg {
                margin-top: 2rem;
            }

            .ui {
                padding-bottom: 6rem;
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div id="loader">
        <div class="loader-text">Iniciando Viaje...</div>
    </div>

    <div class="ui">
        <div class="top-text">
            <div class="title">Universo Infinito</div>
            <div class="msg">
                Cada estrella es un sueño,<br>
                cada latido una historia,<br>
                y tú eres la luz de este cosmos.
            </div>
        </div>

        <div class="bottom-greeting">
            <div class="greeting">✦ Explora la Eternidad ✦</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="script.js?v=7"></script>
</body>

</html>
